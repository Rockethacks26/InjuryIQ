<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RoadSense Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #111; color: white; }

        header {
            background: #1a1a1a;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #f0a500;
            height: 70px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        h1 { color: #f0a500; font-size: 24px; }
        .stats { display: flex; gap: 15px; }

        .stat {
            background: #222;
            padding: 8px 16px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value { font-size: 22px; font-weight: bold; color: #f0a500; }
        .stat-label { font-size: 11px; color: #aaa; }

        #map {
            position: fixed;
            top: 70px;
            left: 0;
            width: calc(100% - 320px);
            height: calc(100vh - 110px);
        }

        .sidebar {
            position: fixed;
            right: 0;
            top: 70px;
            width: 320px;
            height: calc(100vh - 110px);
            background: #1a1a1a;
            border-left: 1px solid #333;
            overflow-y: auto;
            padding: 15px;
            z-index: 1000;
        }

        .sidebar h2 {
            color: #f0a500;
            margin-bottom: 10px;
            font-size: 14px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section { margin-bottom: 20px; }

        .pothole-item {
            background: #222;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            border-left: 4px solid #f0a500;
            font-size: 12px;
            line-height: 1.6;
        }

        .pothole-item.HIGH { border-left-color: #ff4444; }
        .pothole-item.MEDIUM { border-left-color: #ff8800; }
        .pothole-item.LOW { border-left-color: #ffcc00; }

        .severity-HIGH { color: #ff4444; font-weight: bold; }
        .severity-MEDIUM { color: #ff8800; font-weight: bold; }
        .severity-LOW { color: #ffcc00; font-weight: bold; }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #00ff88;
        }

        .pulse {
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
            100% { opacity: 1; transform: scale(1); }
        }

        #ai_report {
            background: #222;
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            line-height: 1.7;
        }

        .analyzing { color: #f0a500; animation: blink 1s infinite; }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #1a1a1a;
            padding: 8px 20px;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #aaa;
            z-index: 1000;
            height: 40px;
        }

        input[type="text"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            background: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 13px;
        }

        input[type="text"]::placeholder { color: #555; }

        .btn {
            background: #f0a500;
            color: black;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            width: 100%;
            margin-bottom: 6px;
        }

        .btn-secondary { background: #333; color: white; }
        .btn-green { background: #00aa55; color: white; }

        .route-option {
            background: #222;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            border: 1px solid #333;
            font-size: 12px;
            cursor: pointer;
            transition: border-color 0.2s;
            line-height: 1.6;
        }

        .route-option:hover { border-color: #f0a500; }
        .route-option.selected { border-color: #00ff88; }
        .route-option.best { border-color: #00ff88; }

        /* Style Google autocomplete dropdown */
        .pac-container {
            background: #222;
            border: 1px solid #444;
            border-radius: 6px;
            z-index: 9999;
        }

        .pac-item {
            color: #ccc;
            padding: 8px;
            font-size: 12px;
            cursor: pointer;
            border-top: 1px solid #333;
        }

        .pac-item:hover { background: #333; }
        .pac-item-query { color: #f0a500; }
        .pac-icon { display: none; }
    </style>
</head>
<body>

<header>
    <h1>RoadSense</h1>
    <div class="stats">
        <div class="stat">
            <div class="stat-value" id="total">0</div>
            <div class="stat-label">Total</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="high_count" style="color:#ff4444">0</div>
            <div class="stat-label">High</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="medium_count" style="color:#ff8800">0</div>
            <div class="stat-label">Medium</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="low_count" style="color:#ffcc00">0</div>
            <div class="stat-label">Low</div>
        </div>
    </div>
    <div class="live-indicator">
        <div class="pulse"></div>
        LIVE
    </div>
</header>

<div id="map"></div>

<div class="sidebar">

    <div class="section">
        <h2>Navigation</h2>
        <input id="start" type="text" placeholder="Start location">
        <input id="end" type="text" placeholder="Destination">
        <button class="btn" onclick="getRoutes()">Find Safest Route</button>
        <button class="btn btn-secondary" onclick="clearRoute()">Clear Route</button>
        <div id="route_options"></div>
    </div>

    <div class="section">
        <h2>Government Report</h2>
        <button class="btn btn-green" onclick="downloadReport()">Download JSON Report</button>
        <button class="btn btn-secondary" onclick="previewReport()">Preview Report</button>
        <div id="report_preview" style="display:none; background:#222; border-radius:8px; padding:10px; margin-top:8px; font-size:11px; color:#ccc; max-height:150px; overflow-y:auto;"></div>
    </div>

    <div class="section">
        <h2>Recent Detections</h2>
        <div id="pothole_list"></div>
    </div>

    <div class="section">
        <h2>AI Road Report</h2>
        <div id="ai_report">
            <p style="color:#aaa;">Detect 3+ potholes to generate AI report...</p>
        </div>
    </div>

</div>

<footer>
    <span id="last_update">Waiting for data...</span>
    <button style="background:#ff4444; color:white; border:none; padding:6px 14px; border-radius:6px; cursor:pointer; font-size:12px; font-weight:bold;" onclick="clearMap()">Clear Map</button>
</footer>

<script>
    let map
    let markers = []
    let potholeData = []
    let infoWindow
    let directionsService
    let directionsRenderers = []
    let allRoutes = []

    function initMap() {
        map = new google.maps.Map(document.getElementById('map'), {
            center: { lat: 43.6532, lng: -79.3832 },
            zoom: 15,
            styles: [
                { elementType: 'geometry', stylers: [{ color: '#242f3e' }] },
                { elementType: 'labels.text.stroke', stylers: [{ color: '#242f3e' }] },
                { elementType: 'labels.text.fill', stylers: [{ color: '#746855' }] },
                { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#38414e' }] },
                { featureType: 'road', elementType: 'geometry.stroke', stylers: [{ color: '#212a37' }] },
                { featureType: 'road', elementType: 'labels.text.fill', stylers: [{ color: '#9ca5b3' }] },
                { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#746855' }] },
                { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#17263c' }] }
            ]
        })

        infoWindow = new google.maps.InfoWindow()
        directionsService = new google.maps.DirectionsService()

        // Places Autocomplete
        const startInput = document.getElementById('start')
        const endInput = document.getElementById('end')

        const startAuto = new google.maps.places.Autocomplete(startInput, {
            types: ['geocode', 'establishment']
        })
        const endAuto = new google.maps.places.Autocomplete(endInput, {
            types: ['geocode', 'establishment']
        })

        startAuto.bindTo('bounds', map)
        endAuto.bindTo('bounds', map)

        // Center on user location
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const userLocation = {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude
                }
                map.setCenter(userLocation)

                // Bias autocomplete to user location
                const circle = new google.maps.Circle({
                    center: userLocation,
                    radius: 50000
                })
                startAuto.setBounds(circle.getBounds())
                endAuto.setBounds(circle.getBounds())
            })
        }

        setInterval(fetchData, 2000)
        fetchData()
    }

    function getSeverityColor(severity) {
        if (severity === 'HIGH') return '#ff4444'
        if (severity === 'MEDIUM') return '#ff8800'
        return '#ffcc00'
    }

    function addPotholeMarker(pothole) {
        const color = getSeverityColor(pothole.severity)
        const size = pothole.severity === 'HIGH' ? 20 : pothole.severity === 'MEDIUM' ? 15 : 10

        const marker = new google.maps.Marker({
            position: { lat: pothole.lat, lng: pothole.lng },
            map,
            icon: {
                path: google.maps.SymbolPath.CIRCLE,
                scale: size,
                fillColor: color,
                fillOpacity: 0.85,
                strokeColor: '#ffffff',
                strokeWeight: 2,
            }
        })

        marker.addListener('click', () => {
            infoWindow.setContent(`
                <div style="color:#000; font-size:13px; line-height:1.6;">
                    <b>Pothole #${pothole.id}</b><br>
                    Severity: <b style="color:${color}">${pothole.severity}</b><br>
                    Impact: <b>${pothole.impact} m/s²</b><br>
                    Time: ${new Date(pothole.timestamp).toLocaleString()}<br>
                    GPS: ${pothole.lat.toFixed(5)}, ${pothole.lng.toFixed(5)}
                </div>
            `)
            infoWindow.open(map, marker)
        })

        markers.push(marker)
        map.panTo({ lat: pothole.lat, lng: pothole.lng })
    }

    function updateStats(potholes) {
        document.getElementById('total').textContent = potholes.length
        document.getElementById('high_count').textContent = potholes.filter(p => p.severity === 'HIGH').length
        document.getElementById('medium_count').textContent = potholes.filter(p => p.severity === 'MEDIUM').length
        document.getElementById('low_count').textContent = potholes.filter(p => p.severity === 'LOW').length
    }

    function updateList(potholes) {
        const list = document.getElementById('pothole_list')
        list.innerHTML = ''
        const recent = [...potholes].reverse().slice(0, 10)
        recent.forEach(p => {
            list.innerHTML += `
                <div class="pothole-item ${p.severity}">
                    <span class="severity-${p.severity}">#${p.id} ${p.severity}</span> — ${p.impact} m/s²<br>
                    ${p.lat.toFixed(4)}, ${p.lng.toFixed(4)}<br>
                    ${new Date(p.timestamp).toLocaleTimeString()}
                </div>
            `
        })
    }

    function updateReport(report, is_analyzing) {
        const el = document.getElementById('ai_report')
        if (is_analyzing) {
            el.innerHTML = '<p class="analyzing">Analyzing road conditions...</p>'
            return
        }
        if (!report || !report.summary || report.summary === 'Waiting for pothole data...') {
            el.innerHTML = '<p style="color:#aaa;">Detect 3+ potholes to generate AI report...</p>'
            return
        }
        const color = report.priority === 'IMMEDIATE' || report.priority === 'HIGH'
            ? '#ff4444' : report.priority === 'MEDIUM' ? '#ff8800' : '#ffcc00'
        el.innerHTML = `
            <div style="color:${color}; font-weight:bold; margin-bottom:8px;">
                Priority: ${report.priority}
            </div>
            <b>Summary:</b><br>
            <span style="color:#ccc">${report.summary}</span><br><br>
            <b>Cause:</b><br>
            <span style="color:#ccc">${report.likely_cause}</span><br><br>
            <b>Action:</b><br>
            <span style="color:#ccc">${report.recommendation}</span><br><br>
            <div style="background:#333; padding:8px; border-radius:6px;">
                Est. Cost: <b style="color:#f0a500">${report.estimated_repair_cost}</b>
            </div>
        `
    }

    function getRoutes() {
        const start = document.getElementById('start').value
        const end = document.getElementById('end').value

        if (!start || !end) {
            document.getElementById('route_options').innerHTML =
                '<p style="color:#ff4444; font-size:12px;">Enter start and destination</p>'
            return
        }

        document.getElementById('route_options').innerHTML =
            '<p style="color:#aaa; font-size:12px;">Finding routes...</p>'

        clearRoute()
        allRoutes = []

        directionsService.route({
            origin: start,
            destination: end,
            travelMode: google.maps.TravelMode.DRIVING,
            provideRouteAlternatives: true
        }, (result, status) => {
            if (status === 'OK') {
                const scoredRoutes = result.routes.map((route, index) => {
                    const legs = route.legs[0]
                    const distanceM = legs.distance.value
                    const potholeCount = countPotholesNearRoute(route)
                    const score = (distanceM / 1000 * 0.4) + (potholeCount * 0.6)

                    return {
                        index,
                        route,
                        result,
                        distance: legs.distance.text,
                        duration: legs.duration.text,
                        distanceM,
                        potholeCount,
                        score
                    }
                })

                scoredRoutes.sort((a, b) => a.score - b.score)
                allRoutes = scoredRoutes
                displayRouteOptions(scoredRoutes)
                selectRoute(0)

            } else {
                document.getElementById('route_options').innerHTML =
                    `<p style="color:#ff4444; font-size:12px;">Route not found: ${status}</p>`
            }
        })
    }

    function displayRouteOptions(routes) {
        const container = document.getElementById('route_options')
        container.innerHTML = '<p style="color:#aaa; font-size:11px; margin-bottom:8px; margin-top:8px;">Select a route:</p>'

        routes.forEach((r, i) => {
            const riskColor = r.potholeCount > 5 ? '#ff4444' :
                             r.potholeCount > 2 ? '#ff8800' : '#00ff88'
            const riskText = r.potholeCount === 0 ? 'Clear road' :
                            r.potholeCount < 3 ? 'Minor hazards' : 'High risk'
            const badge = i === 0 ? ' — RECOMMENDED' : ''

            container.innerHTML += `
                <div class="route-option ${i === 0 ? 'best' : ''}"
                     onclick="selectRoute(${i})" id="route_opt_${i}">
                    <b style="color:${i === 0 ? '#00ff88' : '#f0a500'}">
                        Route ${i + 1}${badge}
                    </b><br>
                    Distance: ${r.distance} &nbsp; Time: ${r.duration}<br>
                    Potholes: <b style="color:${riskColor}">${r.potholeCount} — ${riskText}</b>
                </div>
            `
        })
    }

    function selectRoute(index) {
        directionsRenderers.forEach(r => r.setMap(null))
        directionsRenderers = []

        allRoutes.forEach((r, i) => {
            const renderer = new google.maps.DirectionsRenderer({
                map,
                directions: r.result,
                routeIndex: r.index,
                polylineOptions: {
                    strokeColor: i === index ? '#00ff88' : '#444444',
                    strokeWeight: i === index ? 5 : 2,
                    strokeOpacity: i === index ? 0.9 : 0.4
                },
                suppressMarkers: i !== index
            })
            directionsRenderers.push(renderer)
        })

        allRoutes.forEach((_, i) => {
            const el = document.getElementById(`route_opt_${i}`)
            if (el) el.className = `route-option ${i === 0 ? 'best' : ''} ${i === index ? 'selected' : ''}`
        })
    }

    function clearRoute() {
        directionsRenderers.forEach(r => r.setMap(null))
        directionsRenderers = []
        allRoutes = []
        document.getElementById('route_options').innerHTML = ''
        document.getElementById('start').value = ''
        document.getElementById('end').value = ''
    }

    function countPotholesNearRoute(route) {
        if (potholeData.length === 0) return 0
        const path = route.overview_path
        let count = 0
        potholeData.forEach(pothole => {
            const potholeLatLng = new google.maps.LatLng(pothole.lat, pothole.lng)
            const isNear = path.some(point => {
                const dist = google.maps.geometry.spherical.computeDistanceBetween(point, potholeLatLng)
                return dist < 30
            })
            if (isNear) count++
        })
        return count
    }

    async function downloadReport() {
        try {
            const res = await fetch('http://localhost:8083/api/government_report')
            const data = await res.json()
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' })
            const url = URL.createObjectURL(blob)
            const a = document.createElement('a')
            a.href = url
            a.download = `roadsense_report_${new Date().toISOString().split('T')[0]}.json`
            a.click()
            URL.revokeObjectURL(url)
        } catch(e) {
            alert('Could not generate report — is server running?')
        }
    }

    async function previewReport() {
        const preview = document.getElementById('report_preview')
        if (preview.style.display === 'block') {
            preview.style.display = 'none'
            return
        }
        try {
            const res = await fetch('http://localhost:8083/api/government_report')
            const data = await res.json()
            preview.style.display = 'block'
            preview.innerHTML = `
                <b>${data.report_title}</b><br>
                Generated: ${new Date(data.generated_at).toLocaleString()}<br><br>
                Total: ${data.summary.total_potholes} potholes<br>
                High: ${data.summary.high_severity}<br>
                Medium: ${data.summary.medium_severity}<br>
                Low: ${data.summary.low_severity}<br>
                Priority: <b style="color:#f0a500">${data.summary.priority}</b><br>
                Est. Cost: <b style="color:#f0a500">${data.summary.estimated_repair_cost}</b><br><br>
                <b>Recommendation:</b><br>${data.recommendations}<br><br>
                <b>Cause:</b><br>${data.likely_cause}
            `
        } catch(e) {
            alert('Server not connected — run road_server.py')
        }
    }

    async function fetchData() {
        try {
            const [potholeRes, reportRes] = await Promise.all([
                fetch('http://localhost:8083/api/potholes'),
                fetch('http://localhost:8083/api/report')
            ])
            const data = await potholeRes.json()
            const reportData = await reportRes.json()

            if (data.potholes.length > potholeData.length) {
                const newPotholes = data.potholes.slice(potholeData.length)
                newPotholes.forEach(p => addPotholeMarker(p))
            }

            potholeData = data.potholes
            updateStats(potholeData)
            updateList(potholeData)
            updateReport(reportData.report, reportData.is_analyzing)

            document.getElementById('last_update').textContent =
                `Updated: ${new Date().toLocaleTimeString()} | ${data.total} potholes in database`

        } catch(e) {
            document.getElementById('last_update').textContent = 'Server not connected'
        }
    }

    async function clearMap() {
        if (!confirm('Clear all pothole data? This cannot be undone.')) return
        await fetch('http://localhost:8083/api/clear')
        markers.forEach(m => m.setMap(null))
        markers = []
        potholeData = []
        document.getElementById('pothole_list').innerHTML = ''
        document.getElementById('ai_report').innerHTML =
            '<p style="color:#aaa;">Detect 3+ potholes to generate AI report...</p>'
        updateStats([])
        clearRoute()
    }
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCw3Lg6D56HwX01DPbweN0QcjtrdWFJtvw&libraries=geometry,places&callback=initMap" async defer></script>

</body>
</html>
